name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-20.04]
        compiler: [gcc, clang]
        exclude:
          - os: ubuntu-20.04
            compiler: clang

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libfftw3-dev libncursesw5-dev libpulse-dev libpipewire-0.3-dev ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt-get install -y clang; fi
      - name: Configure compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc" >> $GITHUB_ENV
            echo "CXX=g++" >> $GITHUB_ENV
          fi
      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -GNinja
          ninja -j$(nproc)
      - name: Check binary
        run: |
          if [ -f "build/viz" ]; then echo "✓ Built successfully"; else exit 1; fi
