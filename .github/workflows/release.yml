name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release binary
    runs-on: ubuntu-22.04   # LTS base for widest glibc compatibility

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so changelog generation works

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libncursesw5-dev \
            libfftw3-dev \
            libpulse-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      # Strip -march=native so the binary runs on any x86-64 CPU,
      # not just the exact microarchitecture of the CI runner.
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -DNDEBUG" \
            -DENABLE_PULSEAUDIO=ON \
            -DENABLE_PIPEWIRE=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Strip binary
        run: strip build/viz

      - name: Verify binary
        run: |
          test -f build/viz
          file build/viz
          ldd  build/viz

      # Pack binary + helper scripts into a relocatable tarball.
      # Layout inside the archive mirrors a typical local install:
      #   cava-viz-vX.Y.Z-linux-x86_64/
      #     viz
      #     install.sh
      #     uninstall.sh
      #     README  (if present)
      - name: Package tarball
        run: |
          VERSION="${{ github.ref_name }}"
          PKG="cava-viz-${VERSION}-linux-x86_64"
          mkdir -p "${PKG}"
          cp build/viz          "${PKG}/"
          cp install.sh         "${PKG}/"
          cp uninstall.sh       "${PKG}/"
          [ -f README.md ] && cp README.md "${PKG}/" || true
          tar -czf "${PKG}.tar.gz" "${PKG}"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"
          echo "ASSET=${PKG}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${PKG}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "cava-viz ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
